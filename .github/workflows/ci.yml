name: CI/CD - Sistema de Biblioteca
 
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
 
jobs:
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar GCC
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc make
 
      - name: Build do projeto principal
        run: |
          echo "==> Compilando sistema de biblioteca"
          gcc -Wall -Wextra -o biblioteca \
              projeto.c main_projeto.c \
              -lm
          echo "Build principal concluído com sucesso."